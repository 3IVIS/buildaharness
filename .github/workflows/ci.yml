name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # Fix #52: run ESLint on every push
      - name: Lint
        run: npm run lint

      # Fix #34: TypeScript strict checks (noUnusedLocals/Parameters now enabled)
      - name: Type-check
        run: npm run typecheck

      - name: Test (schema + validation)
        run: npm test -- --reporter=verbose

      # Fix #35: ensure canvas schema stays in sync with canonical spec
      - name: Check schema sync
        run: node scripts/check-schema-sync.mjs

  canvas-package:
    name: '@buildaharness/canvas — typecheck, test, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Root npm ci also installs workspace packages/canvas deps via workspaces
      - name: Install deps (root + workspaces)
        run: npm ci

      - name: Type-check canvas package
        working-directory: packages/canvas
        run: npm run typecheck

      # Verify schema bundled in canvas package stays in sync with canonical spec
      - name: Check canvas schema sync
        run: node scripts/check-schema-sync.mjs

      - name: Test canvas package
        working-directory: packages/canvas
        run: npm test

      - name: Build canvas package (lib mode)
        working-directory: packages/canvas
        run: npm run build

      - name: Verify dist artefacts
        working-directory: packages/canvas
        run: |
          for f in dist/index.js dist/index.cjs dist/index.d.ts dist/styles.css; do
            if [ ! -f "$f" ]; then
              echo "❌  Missing expected dist file: $f"
              exit 1
            fi
          done
          echo "✅  All dist artefacts present"

  adapter:
    name: Adapter — lint (ruff), typecheck (mypy), test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            adapter/requirements.txt
            adapter/requirements-dev.txt

      - name: Install adapter + dev deps
        run: pip install -r adapter/requirements.txt -r adapter/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check adapter/

      - name: Format check (ruff)
        run: ruff format --check adapter/

      # mypy catches async typing issues, FastAPI dependency injection errors,
      # and SQLAlchemy model mismatches that ruff cannot detect.
      # Run from adapter/ so harness/ resolves as "harness.*" not "adapter.harness.*"
      - name: Type-check (mypy)
        run: cd adapter && mypy . --ignore-missing-imports --python-version 3.12

      - name: Test (adapter)
        run: cd adapter && pytest tests/ -v
        env:
          JWT_SECRET: test-secret-for-ci-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          TESTING: "true"

      # Phase 4: MS Agent Framework adapter tests.
      - name: Test (MAF adapter)
        run: cd adapter && pytest tests/test_maf_adapter.py -v
        env:
          JWT_SECRET: test-secret-for-ci-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          TESTING: "true"

  runtime-package:
    name: '@buildaharness/runtime — typecheck, test, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      - name: Type-check
        working-directory: packages/runtime
        run: npm run typecheck

      - name: Test
        working-directory: packages/runtime
        run: npm test

      - name: Build
        working-directory: packages/runtime
        run: npm run build

  react-package:
    name: '@buildaharness/react — typecheck, test, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      - name: Type-check
        working-directory: packages/react
        run: npm run typecheck

      - name: Test
        working-directory: packages/react
        run: npm test

      - name: Build
        working-directory: packages/react
        run: npm run build

  harness-package:
    name: '@buildaharness/harness — typecheck, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      - name: Type-check
        working-directory: packages/harness
        run: npm run typecheck

      - name: Build
        working-directory: packages/harness
        run: npm run build

  personal-assistant-package:
    name: '@buildaharness/personal-assistant — typecheck, test, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      # personal-assistant depends on the real @buildaharness/harness and
      # @buildaharness/runtime packages (no source-path aliasing) — their
      # dist/ must exist before typecheck/test, not just before build.
      - name: Build harness dependency
        run: npm run build:harness

      - name: Build runtime dependency
        run: npm run build:runtime

      - name: Type-check
        working-directory: packages/personal-assistant
        run: npm run typecheck

      - name: Test
        working-directory: packages/personal-assistant
        run: npm test

      - name: Build
        working-directory: packages/personal-assistant
        run: npm run build

  chat-ui-package:
    name: '@buildaharness/chat-ui — typecheck, test, build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      # chat-ui depends on the real @buildaharness/{harness,runtime,personal-assistant}
      # packages (no source-path aliasing) — their dist/ must exist before
      # typecheck/test, and chat-ui also bundles them into its own `vite build`
      # rather than externalizing them (it's an app, not a library), so the
      # same dist/ output covers both needs.
      - name: Build harness dependency
        run: npm run build:harness

      - name: Build runtime dependency
        run: npm run build:runtime

      - name: Build personal-assistant dependency
        run: npm run build:personal-assistant

      - name: Type-check
        working-directory: packages/chat-ui
        run: npm run typecheck

      - name: Test
        working-directory: packages/chat-ui
        run: npm test

      - name: Build
        working-directory: packages/chat-ui
        run: npm run build

  proxy-package:
    name: '@buildaharness/proxy — typecheck, test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (root + workspaces)
        run: npm ci

      - name: Type-check
        working-directory: packages/proxy
        run: npm run typecheck

      - name: Test
        working-directory: packages/proxy
        run: npm test

  spec-package:
    name: '@buildaharness/flow-spec — typecheck, schema check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install spec deps
        working-directory: spec
        run: npm ci

      - name: Type-check spec
        working-directory: spec
        run: npm run typecheck

      - name: Verify schema.json is up to date
        working-directory: spec
        run: node scripts/gen-json-schema.mjs --check

  mastra-runner:
    name: 'mastra-runner — build (tsc)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mastra-runner/package-lock.json

      - name: Install deps
        working-directory: mastra-runner
        run: npm ci

      - name: Build (tsc)
        working-directory: mastra-runner
        run: npm run build

  docs-stats:
    name: 'Docs stats — README/CLAUDE.md counts match source (Phase 4)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            adapter/requirements.txt
            adapter/requirements-dev.txt

      - name: Install node deps
        run: npm ci

      - name: Install adapter + dev deps
        run: pip install -r adapter/requirements.txt -r adapter/requirements-dev.txt

      # scripts/gen-stats.mjs derives test/node-type/service counts from
      # vitest's own JSON reporter, `pytest --collect-only`, spec/schema.ts's
      # Node/HarnessNode unions, and docker-compose.yml, then checks that
      # README.md, README_CN.md, CLAUDE.md (if present — gitignored in a
      # public-only checkout), docs/getting-started.md, docs/architecture.md
      # and docs/stats.md all quote those exact numbers.
      - name: Check doc stats are up to date
        run: node scripts/gen-stats.mjs --check
