name: Offline eval harness

# Run on every push to main and nightly at 03:00 UTC.
# The nightly run uses EVAL_USE_REAL_LLM=true to measure actual quality scores.
# Push runs use mocked LLM (no API key needed) to verify the pipeline is intact.
on:
  push:
    branches: [main]
    paths:
      - "adapter/**"
      - "flows/**"
      - ".github/workflows/eval.yml"
  schedule:
    - cron: "0 3 * * *"   # nightly at 03:00 UTC
  workflow_dispatch:
    inputs:
      use_real_llm:
        description: "Use real LLM for scoring (requires OPENAI_API_KEY secret)"
        type: boolean
        default: false

jobs:
  eval:
    name: Eval harness
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: adapter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            adapter/requirements.txt
            adapter/requirements-eval.txt

      - name: Install adapter dependencies
        run: pip install -r requirements.txt

      - name: Install eval dependencies
        run: pip install -r requirements-eval.txt

      - name: Set eval environment
        run: |
          echo "TESTING=true" >> $GITHUB_ENV
          echo "DATABASE_URL=sqlite+aiosqlite:///:memory:" >> $GITHUB_ENV
          echo "JWT_SECRET=ci-eval-secret-not-for-production" >> $GITHUB_ENV
          # Nightly or manually triggered with real LLM
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.use_real_llm }}" == "true" ]]; then
            echo "EVAL_USE_REAL_LLM=true" >> $GITHUB_ENV
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          fi

      - name: Run spec validation (fast gate — no LLM)
        run: pytest eval/test_spec_validation.py -v --tb=short

      - name: Run RAG quality metrics
        run: pytest eval/test_rag_quality.py -v --tb=short

      - name: Run moderation quality metrics
        run: pytest eval/test_moderation_quality.py -v --tb=short

      - name: Upload eval results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: adapter/.deepeval/
          retention-days: 30
