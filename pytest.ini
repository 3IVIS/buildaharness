[pytest]
asyncio_mode = auto
testpaths   = adapter/tests
# Make adapter/ importable without needing cd adapter/ first
pythonpath  = adapter
markers     =
    harness_state_api: tests that require the DB and the harness-state API endpoints
# deepeval registers a pytest plugin that imports langchain.schema (removed in
# langchain>=0.3). Disable the plugin so the eval test suite can collect and
# run structural tests without crashing at startup.
addopts     = -p no:deepeval
