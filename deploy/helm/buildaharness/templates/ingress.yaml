    {{- include "buildaharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: canvas
  annotations:
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.canvas.tls }}
  tls:
    {{- toYaml .Values.ingress.canvas.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.canvas.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "buildaharness.fullname" . }}-canvas
                port:
                  name: http
{{- end }}
---
# ── Langfuse Ingress ──────────────────────────────────────────────────────────
{{- if and .Values.langfuse.enabled .Values.ingress.langfuse.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "buildaharness.fullname" . }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildaharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse
  annotations:
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.langfuse.tls }}
  tls:
    {{- toYaml .Values.ingress.langfuse.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.langfuse.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "buildaharness.fullname" . }}-langfuse
                port:
                  name: http
{{- end }}
{{- end }}
