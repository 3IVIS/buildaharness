{{- if .Values.litellm.enabled }}
# ── LiteLLM ConfigMap ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "buildaharness.fullname" . }}-litellm-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildaharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
data:
  config.yaml: |
    {{- if .Values.litellm.configYaml }}
    {{- .Values.litellm.configYaml | nindent 4 }}
    {{- else }}
    # Default LiteLLM config — mirrors adapter/litellm_config.yaml from the repo.
    # Override via values.yaml litellm.configYaml.
    model_list:
      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: gpt-4o-mini
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: "os.environ/OPENAI_API_KEY"
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: "os.environ/ANTHROPIC_API_KEY"
    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
    litellm_settings:
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]
    {{- end }}
---
# ── LiteLLM Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildaharness.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildaharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "buildaharness.selectorLabels" (dict "root" . "component" "litellm") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildaharness.selectorLabels" (dict "root" . "component" "litellm") | nindent 8 }}
    spec:
      {{- include "buildaharness.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - name: http
              containerPort: 4000
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: anthropic-api-key
                  optional: true
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: litellm-master-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://buildaharness:$(POSTGRES_PASSWORD)@{{ include "buildaharness.postgresHost" . }}:{{ include "buildaharness.postgresPort" . }}/litellm"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "buildaharness.secretName" . }}
                  key: langfuse-secret-key
            - name: LANGFUSE_HOST
              value: {{ include "buildaharness.langfuseInternalUrl" . | quote }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: {{ include "buildaharness.fullname" . }}-litellm-config
      {{- with .Values.litellm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.litellm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buildaharness.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildaharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "buildaharness.selectorLabels" (dict "root" . "component" "litellm") | nindent 4 }}
{{- end }}
