{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "itsharness.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itsharness.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.global.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  # ── Core auth ──────────────────────────────────────────────────────────────
  jwt-secret: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}

  # ── Database ───────────────────────────────────────────────────────────────
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis-password: {{ required "secrets.redisPassword is required" .Values.secrets.redisPassword | quote }}

  # ── LiteLLM ────────────────────────────────────────────────────────────────
  litellm-master-key: {{ required "secrets.litellmMasterKey is required" .Values.secrets.litellmMasterKey | quote }}

  # ── Langfuse ───────────────────────────────────────────────────────────────
  langfuse-nextauth-secret: {{ required "secrets.langfuse.nextauthSecret is required" .Values.secrets.langfuse.nextauthSecret | quote }}
  langfuse-salt: {{ required "secrets.langfuse.salt is required" .Values.secrets.langfuse.salt | quote }}
  langfuse-encryption-key: {{ required "secrets.langfuse.encryptionKey is required" .Values.secrets.langfuse.encryptionKey | quote }}
  langfuse-public-key: {{ .Values.secrets.langfuse.publicKey | quote }}
  langfuse-secret-key: {{ .Values.secrets.langfuse.secretKey | quote }}
  langfuse-admin-password: {{ .Values.secrets.langfuse.adminPassword | default "" | quote }}

  # ── ClickHouse ─────────────────────────────────────────────────────────────
  clickhouse-password: {{ required "secrets.clickhousePassword is required" .Values.secrets.clickhousePassword | quote }}

  # ── SSO / OIDC ─────────────────────────────────────────────────────────────
  {{- if .Values.oidc.enabled }}
  oidc-client-secret: {{ .Values.secrets.oidcClientSecret | default "" | quote }}
  {{- end }}
  scim-bearer-token: {{ .Values.secrets.scimBearerToken | default "" | quote }}

  # ── Mastra runner ──────────────────────────────────────────────────────────
  mastra-runner-api-key: {{ .Values.secrets.mastraRunnerApiKey | default "" | quote }}

  # ── LLM API keys ───────────────────────────────────────────────────────────
  openai-api-key: {{ .Values.llm.openaiApiKey | default "" | quote }}
  anthropic-api-key: {{ .Values.llm.anthropicApiKey | default "" | quote }}
{{- end }}
