apiVersion: v1
kind: Service
metadata:
  name: {{ include "itsharness.fullname" . }}-adapter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itsharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: adapter
spec:
  type: {{ .Values.adapter.service.type }}
  ports:
    - port: {{ .Values.adapter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "itsharness.selectorLabels" (dict "root" . "component" "adapter") | nindent 4 }}
---
{{- if .Values.adapter.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "itsharness.fullname" . }}-adapter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itsharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: adapter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "itsharness.fullname" . }}-adapter
  minReplicas: {{ .Values.adapter.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.adapter.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.adapter.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.adapter.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
---
{{- if .Values.adapter.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "itsharness.fullname" . }}-adapter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "itsharness.labels" . | nindent 4 }}
    app.kubernetes.io/component: adapter
spec:
  minAvailable: {{ .Values.adapter.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "itsharness.selectorLabels" (dict "root" . "component" "adapter") | nindent 6 }}
{{- end }}
