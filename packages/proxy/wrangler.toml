name = "itsharness-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Uncomment and set your Worker route after deploying:
# [[routes]]
# pattern = "proxy.yourdomain.com/*"
# zone_name = "yourdomain.com"

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"
PORT = "3001"

# Secrets — set via: wrangler secret put <NAME>
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# PROXY_SECRET

# Local dev with miniflare (wrangler dev uses miniflare under the hood).
# Override vars for local dev by creating a .dev.vars file (gitignored):
#   ANTHROPIC_API_KEY=sk-ant-...
#   OPENAI_API_KEY=sk-...
#   PROXY_SECRET=local-secret
#   ALLOWED_ORIGIN=http://localhost:5173

[dev]
port = 3001
local_protocol = "http"
