# Fix #4: standalone ruff.toml uses flat keys, NOT [tool.ruff] table syntax.
# [tool.ruff] is only correct inside pyproject.toml.
# With the old [tool.ruff] structure, ruff parsed it as an unknown [tool] section
# and silently ignored every setting.

target-version = "py312"
line-length = 120
src = ["adapter"]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "S",    # flake8-bandit (security)
  "RUF",  # ruff-specific rules
]
ignore = [
  "S101",   # assert — used in tests
  "S102",   # exec — intentional in codegen runners (exec'd code is fn_ref-validated upstream)
  "S603",   # subprocess — intentional in build scripts
  "B008",   # function calls in default args — FastAPI Depends() pattern
  "S110",   # try-except-pass — intentional in cleanup/teardown paths
  "RUF001", # ambiguous fullwidth CJK punctuation in strings — intentional, see adapter/harness/script_utils.py
  "RUF002", # ambiguous EN-dash in docstrings — intentional range notation (e.g. T01–T21)
  "RUF003", # ambiguous EN-dash in comments — intentional range notation
]

[lint.isort]
# Modules not committed to git must be listed here so ruff classifies them as
# first-party on CI (where the files don't exist and ruff falls back to third-party).
known-first-party = ["a2a_utils", "run_api", "planner_api"]

[lint.per-file-ignores]
"adapter/tests/*.py" = ["S105", "S106", "S107", "S310", "S607"]   # test-only hardcoded credentials; S310: Wikipedia URL fetch; S607: `node` invoked by partial path in test helpers
"adapter/eval/*.py"  = ["S105", "S106", "S107"]
"adapter/migrations/**" = ["S608"]                 # raw SQL in Alembic migration scripts
