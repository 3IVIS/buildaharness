model_list:
  # ── Ollama (local) ──────────────────────────────────────────────────────────
  # api_base uses host.docker.internal so the LiteLLM container can reach the
  # Ollama daemon running on the host.  For local-only (no Docker) use, set
  # OLLAMA_BASE_URL=http://localhost:11434 instead.
  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://host.docker.internal:11434

  # Embedding model — used by RAG ingest script and generated adapter code
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
      drop_params: true

  - model_name: qwen3
    litellm_params:
      model: ollama/qwen3
      api_base: http://host.docker.internal:11434

  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://host.docker.internal:11434

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ── Claude CLI (local subprocess via claude-cli-proxy) ──────────────────────
  # Routes through the claude-cli-proxy sidecar (port 4001) which shells out
  # to `claude -p` using locally-authenticated ~/.claude credentials.
  # Start with: docker compose --profile claude-cli up
  - model_name: claude-cli-sonnet
    litellm_params:
      model: openai/claude-cli-sonnet
      api_base: http://claude-cli-proxy:4001/v1
      api_key: "none"

  - model_name: claude-cli-opus
    litellm_params:
      model: openai/claude-cli-opus
      api_base: http://claude-cli-proxy:4001/v1
      api_key: "none"

  - model_name: claude-cli-haiku
    litellm_params:
      model: openai/claude-cli-haiku
      api_base: http://claude-cli-proxy:4001/v1
      api_key: "none"

  - model_name: claude-cli
    litellm_params:
      model: openai/claude-cli
      api_base: http://claude-cli-proxy:4001/v1
      api_key: "none"

  # ── Anthropic / Claude ──────────────────────────────────────────────────────
  # Set ANTHROPIC_API_KEY in .env to enable these models.
  # Use these model_name values in your flow spec's model field.
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # LiteLLM's internal callback health checker pings Langfuse every ~10s using
  # Bearer auth, which Langfuse rejects (it expects Basic auth). This is benign
  # but noisy. Raising the interval to 1 hour suppresses the log spam without
  # affecting actual trace ingestion, which uses the correct Langfuse SDK auth.
  health_check_interval: 3600

litellm_settings:
  # Langfuse callback — logs every LLM call (cost, tokens, latency) to Langfuse.
  # LiteLLM reads LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
  # from the environment automatically when langfuse is listed here.
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
