# alembic.ini — itsharness adapter
#
# DATABASE_URL is NOT stored here; it is read from the environment in
# migrations/env.py.  This file only configures alembic tooling paths.

[alembic]
script_location = migrations
# %(here)s expands to the directory containing this alembic.ini file (adapter/).
# This means `from db import Base` in env.py works regardless of the working
# directory from which `alembic upgrade head` is invoked — Docker CMD, repo root,
# or CI all resolve to the same adapter/ directory.
prepend_sys_path = %(here)s

# Logging — keep alembic quiet in CI unless ALEMBIC_VERBOSE=true
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
