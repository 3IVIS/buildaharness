# itsharness — Docker Compose
#
# Fixes applied:
#   #3  / #4  — All secrets must be set in .env; no insecure defaults survive.
#   #9        — CORS_ORIGINS env var passed to adapter (comma-separated list).
#   #43       — Canvas uses Dockerfile.canvas; no npm install on every start.
#   #44       — Adapter uses Dockerfile.adapter; no pip install on every start.
#   #45       — LiteLLM gets its own 'litellm' database, not 'itsharness'.
#   #46       — Adapter container has a healthcheck.
#   #47       — langfuse-worker depends_on langfuse with service_healthy.
#   #48       — Adapter has restart: unless-stopped.
#   #49       — VITE_API_URL removed from Docker env (Vite bakes it at build
#               time; set it in .env.local on the host for local dev).
#   #50       — LANGFUSE_S3_EVENT_UPLOAD_BUCKET added to langfuse + langfuse-worker;
#               Langfuse v3 requires this env var to be present (Zod validation)
#               even when S3 is not used. LANGFUSE_S3_EVENT_UPLOAD_ENABLED=false
#               prevents any actual S3 calls.
#   #51       — Langfuse healthcheck uses 127.0.0.1 instead of localhost; Next.js
#               binds to IPv4 only, so 'localhost' resolves to ::1 (IPv6) inside
#               the container and gets ECONNREFUSED even though the server is up.
#
# Quick start:
#   cp .env.example .env
#   # Fill in real secrets — do NOT use the placeholder values.
#   docker compose up --build

services:

  # ── Canvas (Vite dev server) ──────────────────────────────────────────────
  # Fix #43: build deps once in Dockerfile.canvas; no npm install on start.
  canvas:
    build:
      context: .
      dockerfile: Dockerfile.canvas
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source for hot reload; node_modules comes from the image.
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Fix #49: VITE_API_URL is NOT set here — Vite bakes env vars at dev-server
      # start, not at runtime inside the container.  Set it in .env.local on your
      # host machine instead (the file Vite reads automatically in dev mode).
    depends_on:
      adapter:
        condition: service_healthy   # Fix #46: wait for adapter to be ready

  # ── Mastra execution runner (Node.js sidecar) ─────────────────────────────
  # Receives compiled Mastra TypeScript from the adapter, executes it via
  # vm.Module, and streams node events back.  The adapter falls back to
  # codegen-only mode when this service is unavailable.
  mastra-runner:
    build:
      context: ./mastra-runner
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MASTRA_RUNNER_PORT=8001
      # ── LLM routing ───────────────────────────────────────────────────────────
      # In Docker, all LLM calls route through LiteLLM (the unified gateway).
      # LiteLLM picks the right provider (OpenAI, Anthropic, Ollama) from the
      # model name in the flow spec.  OPENAI_API_KEY here is the LiteLLM master
      # key — the actual provider keys (OPENAI_API_KEY, ANTHROPIC_API_KEY) are
      # read by the LiteLLM container from the host .env file.
      #
      # To bypass LiteLLM and call Ollama directly (e.g. for offline dev) set
      # OPENAI_BASE_URL=http://host.docker.internal:11434/v1 in your .env.
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://litellm:4000}
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      # Set a shared secret so only the adapter can call the runner.
      - RUNNER_API_KEY=${MASTRA_RUNNER_API_KEY:-}
      - JOB_TTL_HOURS=${JOB_TTL_HOURS:-4}
      # Execution timeout per workflow run in ms (default 5 min).
      - MASTRA_EXEC_TIMEOUT_MS=${MASTRA_EXEC_TIMEOUT_MS:-300000}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8001/health').then(r=>r.ok||process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Adapter (FastAPI) ──────────────────────────────────────────────────────
  # Fix #44: build deps once in Dockerfile.adapter; no pip install on start.
  adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://itsharness:${POSTGRES_PASSWORD}@postgres:5432/itsharness
      # Fix #3: JWT_SECRET must be set in .env — no fallback; adapter exits if unset.
      - JWT_SECRET=${JWT_SECRET}
      - LITELLM_URL=http://litellm:4000
      # ── LLM routing ───────────────────────────────────────────────────────────
      # In Docker, all LLM calls route through LiteLLM (the unified gateway).
      # LiteLLM picks the right provider (OpenAI, Anthropic, Ollama) from the
      # model name in the flow spec.  OPENAI_API_KEY here is the LiteLLM master
      # key — the actual provider keys (OPENAI_API_KEY, ANTHROPIC_API_KEY) are
      # read by the LiteLLM container from the host .env file.
      #
      # To bypass LiteLLM and call Ollama directly (e.g. for offline dev) set
      # OPENAI_BASE_URL=http://host.docker.internal:11434/v1 in your .env.
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://litellm:4000}
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      # Fix #9: CORS_ORIGINS controls which origins the adapter allows.
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://canvas:3000}
      # Job TTL — completed jobs are evicted after this many hours (Fix #15)
      - JOB_TTL_HOURS=${JOB_TTL_HOURS:-4}
      # Mastra execution runner — the adapter forwards Mastra jobs here.
      # If unset or runner is unreachable, Mastra falls back to codegen-only.
      - MASTRA_RUNNER_URL=${MASTRA_RUNNER_URL:-http://mastra-runner:8001}
      - MASTRA_RUNNER_API_KEY=${MASTRA_RUNNER_API_KEY:-}
      - MASTRA_POLL_INTERVAL_S=${MASTRA_POLL_INTERVAL_S:-0.8}
      - MASTRA_RUNNER_TIMEOUT_S=${MASTRA_RUNNER_TIMEOUT_S:-3600}
      # Security tuning (Fix #6, #7)
      - JWT_TTL_DAYS=${JWT_TTL_DAYS:-30}
      - MAX_BODY_BYTES=${MAX_BODY_BYTES:-1048576}
      # Redis — JWT revocation blocklist (shares the Redis 7 instance used by Langfuse)
      # Database 1 is reserved for itsharness; database 0 is used by Langfuse's BullMQ queue.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      # Langfuse
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=http://langfuse:3000
    # Fix #46: healthcheck so canvas (and CI) knows when the adapter is ready.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Fix #48: restart on crash.
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_healthy
      mastra-runner:
        condition: service_healthy
      litellm:
        condition: service_healthy

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=itsharness
      # Fix #4: password was hardcoded as a literal. Now read from .env — the adapter
      # exits at startup if JWT_SECRET is missing; operators must supply all secrets.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=itsharness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsharness"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── LiteLLM proxy ─────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./adapter/litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # No fallback — LITELLM_MASTER_KEY must be set in .env.
      # The adapter validates JWT_SECRET; .env.example documents all required secrets.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # Fix #45: LiteLLM uses its own 'litellm' database, not 'itsharness'.
      - DATABASE_URL=postgresql://itsharness:${POSTGRES_PASSWORD}@postgres:5432/litellm
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_healthy

  # ── ClickHouse (Langfuse analytics store) ─────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9181:9181"   # ClickHouse Keeper (built-in ZooKeeper replacement)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Single-node cluster config: enables built-in Keeper + defines "default"
      # cluster so Langfuse's ReplicatedMergeTree migrations work without ZooKeeper.
      - ./infra/clickhouse/single-node-cluster.xml:/etc/clickhouse-server/config.d/single-node-cluster.xml:ro
      # Entrypoint wrapper: waits for Keeper to be ready before the container
      # reports healthy, so Langfuse never races against an uninitialised Keeper.
      - ./infra/clickhouse/wait-for-keeper.sh:/wait-for-keeper.sh:ro
    command: ["/bin/sh", "/wait-for-keeper.sh"]
    healthcheck:
      # Passes once ClickHouse is up AND the "default" cluster is visible,
      # which means Keeper has finished initialising.
      test: ["CMD-SHELL", "clickhouse-client --query \"SELECT count() FROM system.clusters WHERE cluster='default'\" | grep -q 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  # ── Redis (Langfuse ingestion queue) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    # Require a password so Langfuse/worker AUTH calls succeed.
    # REDIS_PASSWORD must be set in .env.
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Langfuse web + API ────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:3
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://itsharness:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - CLICKHOUSE_MIGRATION_URL=clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      - CLICKHOUSE_URL=http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_PASSWORD}
      - NEXTAUTH_URL=http://localhost:3001
      # Fix #3: all secrets must be set in .env — no insecure defaults.
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      # Fix #4: ENCRYPTION_KEY must be 64 hex chars; not all-zeroes.
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - LANGFUSE_INIT_ORG_ID=itsharness
      - LANGFUSE_INIT_ORG_NAME=itsharness
      - LANGFUSE_INIT_PROJECT_ID=itsharness-dev
      - LANGFUSE_INIT_PROJECT_NAME=itsharness-dev
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_ADMIN_EMAIL}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_ADMIN_PASSWORD}
      - LANGFUSE_INIT_USER_NAME=Admin
      # Fix #50: Langfuse v3 requires LANGFUSE_S3_EVENT_UPLOAD_BUCKET to be present
      # as a string (Zod validation), even when S3 is not used. Setting _ENABLED=false
      # ensures no actual S3 calls are made.
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=placeholder
    # Fix #47: use service_healthy for ClickHouse and Redis.
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Fix #2: langfuse-worker depends on langfuse with service_healthy — so langfuse
    # MUST have a healthcheck. Without one, docker compose up fails with:
    #   "Service 'langfuse-worker' depends on service 'langfuse' which does not have
    #    a healthcheck configured."
    healthcheck:
      # Fix #51: Next.js binds to the container's Docker network IP, not localhost/127.0.0.1.
      # Use 'hostname -i' to resolve the actual bound IP dynamically.
      # Also use wget since curl is not available in the langfuse image.
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  # ── Langfuse worker (async trace ingestion) ────────────────────────────────
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://itsharness:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - CLICKHOUSE_MIGRATION_URL=clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      - CLICKHOUSE_URL=http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_PASSWORD}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - TELEMETRY_ENABLED=false
      # Fix #50: same S3 vars required by langfuse-worker for the same reason.
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=placeholder
    # Fix #47: wait for langfuse to be healthy (migrations complete) before starting worker.
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
